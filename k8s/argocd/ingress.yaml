# .Synopsis
#     Ingress for ArgoCD UI — managed by AGIC (Azure Application Gateway Ingress Controller)
#     TLS is terminated at the Application Gateway using the sonarqube-wildcard certificate.
#     ArgoCD server runs in insecure mode (HTTP) so AGIC proxies to port 80.
#
# .NOTES
#     Author  : Roman Rabodzei
#     Version    : 1.0.260410
#
#             _
#         .__(.)<  (MEOW)
#          \___)
#  ~~~~~~~~~~~~~~~~~~~~~~~~

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd
  namespace: sonarqube-argocd
  annotations:
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
    appgw.ingress.kubernetes.io/request-timeout: "60"
    appgw.ingress.kubernetes.io/appgw-ssl-certificate: sonarqube-wildcard
spec:
  ingressClassName: azure-application-gateway
  rules:
    - host: argocd.<domain>
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
