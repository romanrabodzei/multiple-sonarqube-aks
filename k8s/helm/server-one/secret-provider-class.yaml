# .Synopsis
#     The CSI Secret Store driver pulls secrets from Key Vault and creates
#     sonarqube-db-secret automatically in this namespace.
#
#     Key Vault secrets populated by infra-deploy pipeline (Bicep):
#       sonarqube-postgres-host      — FQDN (read from existing Postgres resource)
#       sonarqube-postgres-username  — admin login (read from existing Postgres resource)
#       sonarqube-postgres-password  — admin password (@secure param in Bicep)
#
#     Pipeline substitutes before applying:
#       KEYVAULT_NAME     — from Bicep output keyVaultName
#       TENANT_ID         — from az account show
#       KUBELET_CLIENT_ID — from Bicep output aksKubeletIdentityClientId
#
# The JDBC URL for this instance is assembled in the pod
# via the SONAR_JDBC_URL env var in the Helm values.
#
# .NOTES
#     Author  : Roman Rabodzei
#     Version    : 1.0.260410
#
#             _
#         .__(.)<  (MEOW)
#          \___)
#  ~~~~~~~~~~~~~~~~~~~~~~~~

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: sonarqube-db-secret-provider
  namespace: sonarqube-server-one
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "7db69faf-a360-4343-b04a-6504d7913cdc"
    keyvaultName: "sonarqube-kv-001"
    tenantId: "fb76e9a5-e631-4f1c-bef7-bfb226e9aee3"
    objects: |
      array:
        - |
          objectName: sonarqube-postgres-host
          objectType: secret
          objectAlias: postgres-host
        - |
          objectName: sonarqube-postgres-username
          objectType: secret
          objectAlias: jdbc-username
        - |
          objectName: sonarqube-postgres-password
          objectType: secret
          objectAlias: jdbc-password
  secretObjects:
    - secretName: sonarqube-db-secret
      type: Opaque
      data:
        - objectName: postgres-host
          key: postgres-host
        - objectName: jdbc-username
          key: jdbc-username
        - objectName: jdbc-password
          key: jdbc-password
